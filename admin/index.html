<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:       #0f0f0f;
  --surface:  #1a1a1a;
  --border:   #2a2a2a;
  --gold:     #c9a84c;
  --gold2:    #e8d08a;
  --text:     #e8e8e8;
  --muted:    #888;
  --danger:   #e05555;
  --success:  #5cba8a;
  --radius:   10px;
}

body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; }

/* ── LOGIN ── */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:40px; width:100%; max-width:360px;
  display:flex; flex-direction:column; gap:20px;
}
.login-box h1 { font-size:22px; font-weight:500; color:var(--gold); text-align:center; }
.login-box p  { font-size:12px; color:var(--muted); text-align:center; margin-top:-12px; }

/* ── LAYOUT ── */
#app { display:none; min-height:100vh; }

.sidebar {
  position:fixed; top:0; left:0; bottom:0; width:220px;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:24px 16px;
  gap:4px; z-index:100;
}
.logo { font-size:20px; font-weight:600; color:var(--gold); margin-bottom:24px; padding:0 8px; }
.logo span { color:var(--muted); font-weight:300; }

.nav-btn {
  background:none; border:none; color:var(--muted); cursor:pointer;
  text-align:left; padding:10px 12px; border-radius:8px;
  font-size:13px; font-family:'Inter',sans-serif; transition:all 0.15s;
  display:flex; align-items:center; gap:8px;
}
.nav-btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
.nav-btn.active { color:var(--gold); background:rgba(201,168,76,0.1); }
.nav-btn svg { width:16px; height:16px; flex-shrink:0; }

.sidebar-footer { margin-top:auto; }
.logout-btn { color:var(--danger) !important; }

.main { margin-left:220px; padding:32px; }

/* ── HEADER ── */
.page-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:28px;
}
.page-header h2 { font-size:20px; font-weight:500; }

/* ── CARDS CLIENTES ── */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }

.cliente-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px;
  display:flex; flex-direction:column; gap:14px;
  transition:border-color 0.2s;
}
.cliente-card:hover { border-color: #3a3a3a; }

.cliente-card-header {
  display:flex; align-items:center; gap:12px;
}
.avatar {
  width:46px; height:46px; border-radius:50%; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:500; flex-shrink:0;
}
.avatar img { width:100%; height:100%; object-fit:cover; }
.cliente-info h3 { font-size:15px; font-weight:500; margin-bottom:2px; }
.cliente-info p  { font-size:12px; color:var(--muted); }

.slug-badge {
  font-size:11px; color:var(--muted); background:rgba(255,255,255,0.05);
  padding:3px 8px; border-radius:20px; font-family:monospace;
}

.cliente-card-actions { display:flex; gap:8px; }

.badge-ativo   { background:rgba(92,186,138,0.15); color:var(--success); font-size:11px; padding:3px 8px; border-radius:20px; }
.badge-inativo { background:rgba(224,85,85,0.15);  color:var(--danger);  font-size:11px; padding:3px 8px; border-radius:20px; }

/* ── BOTÕES ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:13px; font-family:'Inter',sans-serif; font-weight:500; cursor:pointer; border:none; transition:all 0.15s; text-decoration:none; }
.btn-gold    { background:var(--gold); color:#0f0f0f; }
.btn-gold:hover { background:var(--gold2); }
.btn-ghost   { background:rgba(255,255,255,0.06); color:var(--text); }
.btn-ghost:hover { background:rgba(255,255,255,0.1); }
.btn-danger  { background:rgba(224,85,85,0.15); color:var(--danger); }
.btn-danger:hover { background:rgba(224,85,85,0.25); }
.btn-sm      { padding:6px 10px; font-size:12px; }
.btn svg     { width:14px; height:14px; }

/* ── INPUTS ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid.full { grid-template-columns:1fr; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:12px; color:var(--muted); font-weight:500; }
.field input, .field select, .field textarea {
  background:#111; border:1px solid var(--border); color:var(--text);
  padding:10px 12px; border-radius:8px; font-size:13px; font-family:'Inter',sans-serif;
  transition:border-color 0.15s; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
.field input[type="color"] { padding:4px 8px; height:40px; cursor:pointer; }
.color-row { display:flex; align-items:center; gap:8px; }
.color-row input[type="text"] { flex:1; }

/* ── MODAL ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto; padding:28px;
  display:flex; flex-direction:column; gap:20px;
}
.modal-header { display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:17px; font-weight:500; }
.modal-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; line-height:1; padding:4px; }
.modal-close:hover { color:var(--text); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; padding-top:8px; border-top:1px solid var(--border); }

/* ── LINKS EDITOR ── */
.links-list { display:flex; flex-direction:column; gap:8px; }
.link-item {
  background:#111; border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; display:flex; align-items:center; gap:10px;
}
.link-item .drag-handle { color:var(--muted); cursor:grab; font-size:16px; }
.link-item-info { flex:1; min-width:0; }
.link-item-info strong { display:block; font-size:13px; margin-bottom:2px; }
.link-item-info span   { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
.destaque-pill { font-size:10px; background:rgba(201,168,76,0.2); color:var(--gold); padding:2px 7px; border-radius:20px; }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; right:24px; z-index:500;
  background:#1e1e1e; border:1px solid var(--border);
  border-radius:10px; padding:12px 18px; font-size:13px;
  display:none; align-items:center; gap:10px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
  max-width:320px;
}
#toast.show { display:flex; }
#toast.ok   { border-color: var(--success); color:var(--success); }
#toast.err  { border-color: var(--danger);  color:var(--danger); }

/* ── TABS ── */
.tabs { display:flex; gap:4px; background:var(--bg); border-radius:8px; padding:4px; width:fit-content; margin-bottom:20px; }
.tab  { padding:8px 16px; border-radius:6px; border:none; background:none; color:var(--muted); font-size:13px; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.15s; }
.tab.active { background:var(--surface); color:var(--text); }

/* ── PREVIEW LINK ── */
.preview-btn { font-size:11px; color:var(--gold); text-decoration:none; display:flex; align-items:center; gap:4px; }
.preview-btn:hover { text-decoration:underline; }

/* ── EMPTY ── */
.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty svg { width:48px; height:48px; opacity:0.3; margin:0 auto 16px; display:block; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Nexa</h1>
    <p>painel de gerenciamento</p>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-gold" onclick="login()" style="width:100%;justify-content:center;padding:12px">
      Entrar
    </button>
    <div id="login-err" style="color:#e05555;font-size:12px;text-align:center;display:none">Senha incorreta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="sidebar">
    <div class="logo">Nexa<span>.admin</span></div>

    <button class="nav-btn active" onclick="showPage('clientes')" id="nav-clientes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75"/><path d="M21 21v-2a4 4 0 00-3-3.87"/></svg>
      Clientes
    </button>

    <div class="sidebar-footer">
      <button class="nav-btn logout-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </nav>

  <main class="main" id="main-content"></main>
</div>

<!-- MODAL CLIENTE -->
<div class="overlay" id="modal-cliente">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-cliente-title">Novo Cliente</h3>
      <button class="modal-close" onclick="closeModal('modal-cliente')">×</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('info')" id="tab-info">Informações</button>
      <button class="tab" onclick="switchTab('links')" id="tab-links">Links</button>
      <button class="tab" onclick="switchTab('visual')" id="tab-visual">Visual</button>
    </div>

    <!-- TAB INFO -->
    <div id="tab-content-info">
      <div class="form-grid">
        <div class="field">
          <label>Nome completo *</label>
          <input type="text" id="f-nome" placeholder="Karol Ferreira">
        </div>
        <div class="field">
          <label>Especialidade</label>
          <input type="text" id="f-especialidade" placeholder="Extensão de Cílios">
        </div>
        <div class="field">
          <label>Slug (URL) *</label>
          <input type="text" id="f-slug" placeholder="karol-ferreira">
        </div>
        <div class="field">
          <label>Foto (URL da imagem)</label>
          <input type="text" id="f-foto" placeholder="https://...">
        </div>
        <div class="field" style="grid-column:1/-1">
          <label>Status</label>
          <select id="f-ativo">
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TAB LINKS -->
    <div id="tab-content-links" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:12px;color:var(--muted)">Arraste para reordenar</span>
        <button class="btn btn-ghost btn-sm" onclick="addLink()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo link
        </button>
      </div>
      <div class="links-list" id="links-list"></div>
    </div>

    <!-- TAB VISUAL -->
    <div id="tab-content-visual" style="display:none">
      <div class="form-grid">
        <div class="field">
          <label>Tema</label>
          <select id="f-tema">
            <option value="claro">Claro (fundo branco)</option>
            <option value="escuro">Escuro (fundo preto)</option>
          </select>
        </div>
        <div class="field">
          <label>Cor de fundo</label>
          <div class="color-row">
            <input type="color" id="f-cor-fundo-picker" value="#ffffff" oninput="syncColor('fundo')">
            <input type="text"  id="f-cor-fundo" value="#ffffff" oninput="syncColorPicker('fundo')" placeholder="#ffffff">
          </div>
        </div>
        <div class="field">
          <label>Cor primária (botões)</label>
          <div class="color-row">
            <input type="color" id="f-cor-primaria-picker" value="#b89a7a" oninput="syncColor('primaria')">
            <input type="text"  id="f-cor-primaria" value="#b89a7a" oninput="syncColorPicker('primaria')" placeholder="#b89a7a">
          </div>
        </div>
        <div class="field">
          <label>Cor do texto/nome</label>
          <div class="color-row">
            <input type="color" id="f-cor-texto-picker" value="#5a3e2b" oninput="syncColor('texto')">
            <input type="text"  id="f-cor-texto" value="#5a3e2b" oninput="syncColorPicker('texto')" placeholder="#5a3e2b">
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-cliente')">Cancelar</button>
      <button class="btn btn-gold" onclick="salvarCliente()" id="btn-salvar">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL LINK -->
<div class="overlay" id="modal-link">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 id="modal-link-title">Novo Link</h3>
      <button class="modal-close" onclick="closeModal('modal-link')">×</button>
    </div>
    <div class="form-grid full">
      <div class="field">
        <label>Rótulo *</label>
        <input type="text" id="lf-label" placeholder="Agendar Horário">
      </div>
      <div class="field">
        <label>URL *</label>
        <input type="text" id="lf-url" placeholder="https://...">
      </div>
      <div class="field">
        <label>Ícone</label>
        <select id="lf-icone">
          <option value="calendar">📅 Calendário</option>
          <option value="instagram">📷 Instagram</option>
          <option value="whatsapp">💬 WhatsApp</option>
          <option value="maps">📍 Localização</option>
          <option value="link">🔗 Link genérico</option>
        </select>
      </div>
      <div class="field">
        <label>
          <input type="checkbox" id="lf-destaque" style="margin-right:6px">
          Botão de destaque (sólido)
        </label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-link')">Cancelar</button>
      <button class="btn btn-gold" onclick="salvarLink()">Salvar Link</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL  = 'https://wnyfaefcfgwhawcswjyx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
const ADMIN_SENHA   = 'nexa2025';          // ← mude sua senha aqui
const SITE_BASE     = 'https://seusite.com/cliente'; // ← URL base do seu host
// ──────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── AUTH simples ──
function login() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_SENHA) {
    sessionStorage.setItem('nexa_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    showPage('clientes');
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
function logout() { sessionStorage.removeItem('nexa_auth'); location.reload(); }
if (sessionStorage.getItem('nexa_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── TOAST ──
function toast(msg, tipo='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + tipo;
  setTimeout(() => t.className = '', 3000);
}

// ── MODAIS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── TABS ──
let activeTab = 'info';
function switchTab(tab) {
  ['info','links','visual'].forEach(t => {
    document.getElementById('tab-content-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  activeTab = tab;
}

// ── CORES ──
function syncColor(which) {
  const v = document.getElementById('f-cor-'+which+'-picker').value;
  document.getElementById('f-cor-'+which).value = v;
}
function syncColorPicker(which) {
  const v = document.getElementById('f-cor-'+which).value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById('f-cor-'+which+'-picker').value = v;
}

// ── SLUG AUTO ──
document.addEventListener('input', e => {
  if (e.target.id === 'f-nome' && !editingId) {
    document.getElementById('f-slug').value = e.target.value
      .toLowerCase().trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  }
});

// ══════════════════════════════════════════
//  PÁGINA: CLIENTES
// ══════════════════════════════════════════
async function showPage(page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  if (page === 'clientes') await renderClientes();
}

let clientes = [];
async function renderClientes() {
  const { data, error } = await sb.from('clientes').select('*').order('criado_em', {ascending:false});
  if (error) { toast('Erro ao carregar clientes', 'err'); return; }
  clientes = data || [];

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="page-header">
      <h2>Clientes</h2>
      <button class="btn btn-gold" onclick="novoCliente()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo cliente
      </button>
    </div>
    <div class="grid" id="clientes-grid"></div>
  `;

  const grid = document.getElementById('clientes-grid');
  if (!clientes.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
      <p>Nenhum cliente ainda. Clique em "Novo cliente" para começar.</p>
    </div>`;
    return;
  }

  clientes.forEach(c => {
    const cor = c.cor_primaria || '#b89a7a';
    const ini = c.nome.charAt(0);
    const fotoHTML = c.foto_url
      ? `<img src="${c.foto_url}" alt="${c.nome}">`
      : `<span>${ini}</span>`;

    const card = document.createElement('div');
    card.className = 'cliente-card';
    card.innerHTML = `
      <div class="cliente-card-header">
        <div class="avatar" style="background:${cor}22;color:${cor}">${fotoHTML}</div>
        <div class="cliente-info">
          <h3>${c.nome}</h3>
          <p>${c.especialidade || '—'}</p>
        </div>
        <span class="${c.ativo ? 'badge-ativo':'badge-inativo'}">${c.ativo?'ativo':'inativo'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="slug-badge">/${c.slug}</span>
        <a class="preview-btn" href="${SITE_BASE}/${c.slug}" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          ver site
        </a>
      </div>
      <div class="cliente-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="editarCliente('${c.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Editar
        </button>
        <button class="btn btn-ghost btn-sm" onclick="editarLinks('${c.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
          Links
        </button>
        <button class="btn btn-danger btn-sm" onclick="deletarCliente('${c.id}','${c.nome}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          Excluir
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── NOVO / EDITAR CLIENTE ──
let editingId = null;
let editingLinks = [];

function novoCliente() {
  editingId = null; editingLinks = [];
  document.getElementById('modal-cliente-title').textContent = 'Novo Cliente';
  ['nome','especialidade','slug','foto'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-ativo').value = 'true';
  document.getElementById('f-tema').value = 'claro';
  document.getElementById('f-cor-fundo').value = '#ffffff';
  document.getElementById('f-cor-fundo-picker').value = '#ffffff';
  document.getElementById('f-cor-primaria').value = '#b89a7a';
  document.getElementById('f-cor-primaria-picker').value = '#b89a7a';
  document.getElementById('f-cor-texto').value = '#5a3e2b';
  document.getElementById('f-cor-texto-picker').value = '#5a3e2b';
  switchTab('info');
  renderLinksList();
  openModal('modal-cliente');
}

async function editarCliente(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  editingId = id;

  document.getElementById('modal-cliente-title').textContent = 'Editar Cliente';
  document.getElementById('f-nome').value          = c.nome || '';
  document.getElementById('f-especialidade').value = c.especialidade || '';
  document.getElementById('f-slug').value          = c.slug || '';
  document.getElementById('f-foto').value          = c.foto_url || '';
  document.getElementById('f-ativo').value         = String(c.ativo);
  document.getElementById('f-tema').value          = c.tema || 'claro';

  const cp = c.cor_primaria || '#b89a7a';
  const cf = c.cor_fundo    || '#ffffff';
  const ct = c.cor_texto    || '#5a3e2b';
  document.getElementById('f-cor-primaria').value = cp;
  document.getElementById('f-cor-primaria-picker').value = cp;
  document.getElementById('f-cor-fundo').value = cf;
  document.getElementById('f-cor-fundo-picker').value = cf;
  document.getElementById('f-cor-texto').value = ct;
  document.getElementById('f-cor-texto-picker').value = ct;

  // Carrega links
  const { data: links } = await sb.from('links').select('*').eq('cliente_id', id).order('ordem');
  editingLinks = links || [];

  switchTab('info');
  renderLinksList();
  openModal('modal-cliente');
}

async function salvarCliente() {
  const nome  = document.getElementById('f-nome').value.trim();
  const slug  = document.getElementById('f-slug').value.trim();
  if (!nome || !slug) { toast('Nome e slug são obrigatórios', 'err'); return; }

  const payload = {
    nome, slug,
    especialidade: document.getElementById('f-especialidade').value.trim() || null,
    foto_url:      document.getElementById('f-foto').value.trim()          || null,
    ativo:         document.getElementById('f-ativo').value === 'true',
    tema:          document.getElementById('f-tema').value,
    cor_primaria:  document.getElementById('f-cor-primaria').value,
    cor_fundo:     document.getElementById('f-cor-fundo').value,
    cor_texto:     document.getElementById('f-cor-texto').value,
    atualizado_em: new Date().toISOString(),
  };

  let clienteId = editingId;
  if (editingId) {
    const { error } = await sb.from('clientes').update(payload).eq('id', editingId);
    if (error) { toast('Erro ao salvar: ' + error.message, 'err'); return; }
  } else {
    const { data, error } = await sb.from('clientes').insert(payload).select().single();
    if (error) { toast('Erro ao criar: ' + error.message, 'err'); return; }
    clienteId = data.id;
  }

  // Salva links
  if (clienteId && editingLinks.length) {
    for (let i = 0; i < editingLinks.length; i++) {
      const l = { ...editingLinks[i], cliente_id: clienteId, ordem: i+1 };
      if (l.id && !l.id.startsWith('new_')) {
        await sb.from('links').update(l).eq('id', l.id);
      } else {
        delete l.id;
        await sb.from('links').insert(l);
      }
    }
  }

  toast(editingId ? 'Cliente atualizado!' : 'Cliente criado!');
  closeModal('modal-cliente');
  await renderClientes();
}

async function deletarCliente(id, nome) {
  if (!confirm(`Excluir "${nome}"? Isso apagará todos os links também.`)) return;
  const { error } = await sb.from('clientes').delete().eq('id', id);
  if (error) { toast('Erro ao excluir', 'err'); return; }
  toast('Cliente excluído');
  await renderClientes();
}

// ── LINKS ──
function editarLinks(id) {
  editarCliente(id).then(() => switchTab('links'));
}

function renderLinksList() {
  const list = document.getElementById('links-list');
  if (!editingLinks.length) {
    list.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">Nenhum link ainda</div>`;
    return;
  }
  list.innerHTML = editingLinks.map((l, i) => `
    <div class="link-item">
      <span class="drag-handle">⠿</span>
      <div class="link-item-info">
        <strong>${l.label} ${l.destaque ? '<span class="destaque-pill">destaque</span>' : ''}</strong>
        <span>${l.url}</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="editLink(${i})">Editar</button>
      <button class="btn btn-danger btn-sm" onclick="removeLink(${i})">×</button>
    </div>
  `).join('');
}

let editingLinkIdx = null;
function addLink() {
  editingLinkIdx = null;
  ['lf-label','lf-url'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('lf-icone').value = 'link';
  document.getElementById('lf-destaque').checked = false;
  document.getElementById('modal-link-title').textContent = 'Novo Link';
  openModal('modal-link');
}

function editLink(idx) {
  editingLinkIdx = idx;
  const l = editingLinks[idx];
  document.getElementById('lf-label').value   = l.label || '';
  document.getElementById('lf-url').value     = l.url   || '';
  document.getElementById('lf-icone').value   = l.icone || 'link';
  document.getElementById('lf-destaque').checked = !!l.destaque;
  document.getElementById('modal-link-title').textContent = 'Editar Link';
  openModal('modal-link');
}

function removeLink(idx) {
  editingLinks.splice(idx, 1);
  renderLinksList();
}

function salvarLink() {
  const label = document.getElementById('lf-label').value.trim();
  const url   = document.getElementById('lf-url').value.trim();
  if (!label || !url) { toast('Rótulo e URL são obrigatórios', 'err'); return; }

  const link = {
    id:       editingLinkIdx !== null ? editingLinks[editingLinkIdx].id : 'new_' + Date.now(),
    label, url,
    icone:    document.getElementById('lf-icone').value,
    destaque: document.getElementById('lf-destaque').checked,
    ativo:    true,
  };

  if (editingLinkIdx !== null) editingLinks[editingLinkIdx] = link;
  else editingLinks.push(link);

  renderLinksList();
  closeModal('modal-link');
}

// Inicializa
if (sessionStorage.getItem('nexa_auth')) showPage('clientes');
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#c9a84c;--bg:#0d0d0d;--text:#f0f0f0;--muted:rgba(255,255,255,0.45);--bor:rgba(255,255,255,0.08);--sur:rgba(255,255,255,0.04);--sur2:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}
.hero{position:relative;height:46vh;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-ph{width:100%;height:100%;background:linear-gradient(160deg,#2a2a2a,#1a1a1a);}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,0) 30%,rgba(0,0,0,.65) 70%,var(--bg) 100%);}
.hero-info{position:absolute;bottom:18px;left:18px;right:18px;}
.hero-nome{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1.1;margin-bottom:5px;}
.hero-nome em{font-style:italic;color:var(--primary);}
.hero-esp{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);}
.content{padding:20px 16px 120px;}
.sec{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
/* SERVIÇOS */
.servs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.sv{background:var(--sur);border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .18s;}
.sv.sel{border-color:var(--primary);}
.sv img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.sv-ph{width:100%;aspect-ratio:4/3;background:var(--sur2);display:flex;align-items:center;justify-content:center;color:var(--bor);}
.sv-body{padding:12px;}
.sv-titulo{font-size:13px;font-weight:600;margin-bottom:2px;}
.sv-dur{font-size:11px;color:var(--muted);margin-bottom:6px;}
.sv-preco{font-size:14px;font-weight:700;color:var(--primary);}
/* CALENDÁRIO */
.cal-wrap{margin-bottom:28px;}
.cal-nav{display:flex;align-items:center;margin-bottom:14px;}
.cal-nav h3{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:18px;}
.cal-btn{width:34px;height:34px;border-radius:50%;background:var(--sur);border:1px solid var(--bor);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.cal-btn:hover{border-color:var(--primary);color:var(--primary);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dn{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;}
.cd{aspect-ratio:1;border-radius:8px;border:none;font-size:12px;cursor:pointer;background:none;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Inter',sans-serif;}
.cd:disabled{color:rgba(255,255,255,.12);cursor:default;}
.cd.hoje{border:1px solid rgba(201,168,76,.4);}
.cd.bloq{background:rgba(224,85,85,.06);color:rgba(224,85,85,.4);cursor:default;}
.cd.sel{background:var(--primary);color:#0d0d0d;font-weight:700;}
.cd.disp:not(.sel):hover{background:rgba(201,168,76,.15);}
/* HORÁRIOS */
.hrs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px;}
.hr-btn{padding:10px;border-radius:10px;border:1px solid var(--bor);background:none;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.hr-btn:hover{border-color:var(--primary);}
.hr-btn.sel{background:var(--primary);color:#0d0d0d;border-color:var(--primary);font-weight:600;}
/* FORM */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11px;color:var(--muted);}
.field input{background:var(--sur2);border:1px solid var(--bor);color:var(--text);padding:11px 14px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--primary);}
/* BOTÃO */
.btn-agendar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:rgba(13,13,13,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bor);}
.btn-agendar button{width:100%;padding:15px;border-radius:14px;background:var(--primary);color:#0d0d0d;border:none;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.btn-agendar button:hover{filter:brightness(1.1);}
.btn-agendar button:disabled{opacity:.4;cursor:default;}
/* CONFIRMAÇÃO */
.conf{text-align:center;padding:40px 20px;}
.conf-icon{font-size:52px;margin-bottom:16px;}
.conf h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;}
.conf p{font-size:13px;color:var(--muted);line-height:1.6;}
.conf-det{background:var(--sur);border-radius:14px;padding:16px;margin:20px 0;text-align:left;}
.conf-det .row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bor);}
.conf-det .row:last-child{border-bottom:none;}
.conf-det .row span{flex:1;font-size:13px;}
.conf-det .row strong{font-size:13px;}
.spin{width:28px;height:28px;border:2px solid var(--bor);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
.step-label{font-size:12px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:6px;}
.step-label svg{width:14px;height:14px;color:var(--primary);}
</style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div class="spin"></div></div>
<script>
const SB_URL='https://wnyfaefcfgwhawcswjyx.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
const sb=supabase.createClient(SB_URL,SB_ANON);
const slug=location.pathname.split('/').filter(Boolean).pop();
const params=new URLSearchParams(location.search);
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const hoje=new Date(); hoje.setHours(0,0,0,0);

let PROF=null,SERVS=[],DISP=[],BLOQS=[],AGS=[],CFG=null;
let selServ=null,calMes=new Date(hoje.getFullYear(),hoje.getMonth(),1),selDia=null,selHr=null;
let horariosLivres=[];

function durStr(m){return m>=60?`${Math.floor(m/60)}h${m%60?m%60+'min':''}`:`${m}min`;}
function toMin(s){const[h,m]=s.split(':').map(Number);return h*60+m;}
function toHH(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
function fmtDia(d){const s=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});return s.charAt(0).toUpperCase()+s.slice(1);}

async function init(){
  const{data:prof}=await sb.from('clientes').select('*').eq('slug',slug).eq('agenda_ativo',true).single();
  if(!prof){document.getElementById('root').innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,.3)">Página não encontrada</div>';return;}
  PROF=prof;
  document.documentElement.style.setProperty('--primary',prof.cor_primary||'#c9a84c');
  document.documentElement.style.setProperty('--bg',prof.cor_bg||'#0d0d0d');
  document.documentElement.style.setProperty('--text',prof.cor_texto||'#f0f0f0');
  document.title=`Agendar · ${prof.nome}`;
  const[{data:servs},{data:disp},{data:bloqs},{data:cfg}]=await Promise.all([
    sb.from('servicos').select('*').eq('cliente_id',prof.id).eq('ativo',true).order('ordem'),
    sb.from('disponibilidade').select('*').eq('cliente_id',prof.id).eq('ativo',true),
    sb.from('bloqueios').select('*').eq('cliente_id',prof.id),
    sb.from('config_agenda').select('*').eq('cliente_id',prof.id).maybeSingle()
  ]);
  SERVS=servs||[]; DISP=disp||[]; BLOQS=bloqs||[]; CFG=cfg;
  const preselId=params.get('s');
  if(preselId) selServ=SERVS.find(s=>s.id===preselId)||null;
  render();
}

function render(){
  const ini=PROF.nome.charAt(0),resto=PROF.nome.slice(1);
  document.getElementById('root').outerHTML=`
    <div class="hero">${PROF.foto_capa_url?`<img src="${PROF.foto_capa_url}" alt="">`:'<div class="hero-ph"></div>'}<div class="hero-grad"></div><div class="hero-info"><div class="hero-nome"><em>${ini}</em>${resto}</div>${PROF.especialidade?`<div class="hero-esp">${PROF.especialidade}</div>`:''}</div></div>
    <div class="content" id="content"></div>
    <div class="btn-agendar"><button id="btn-ag" onclick="avancar()" disabled>Selecione um serviço</button></div>`;
  renderContent();
}

function renderContent(){
  const c=document.getElementById('content');
  if(!c) return;
  // Serviços
  const servsH=SERVS.map(s=>`<div class="sv ${selServ?.id===s.id?'sel':''}" onclick="selecionarServ('${s.id}')">
    ${s.foto_url?`<img src="${s.foto_url}" alt="">`:'<div class="sv-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="28" height="28"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>'}
    <div class="sv-body"><div class="sv-titulo">${s.titulo}</div><div class="sv-dur">${durStr(s.duracao_min||60)}</div><div class="sv-preco">${s.valor?'R$ '+Number(s.valor).toFixed(2).replace('.',','):''}</div></div>
  </div>`).join('');

  // Calendário
  const ano=calMes.getFullYear(),m=calMes.getMonth();
  const prim=new Date(ano,m,1).getDay(),ult=new Date(ano,m+1,0).getDate();
  const dispMap={};DISP.forEach(d=>dispMap[d.dia_semana]=d);
  let calH=DIAS.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  for(let i=0;i<prim;i++)calH+=`<button class="cd" disabled></button>`;
  for(let d=1;d<=ult;d++){
    const dt=new Date(ano,m,d);
    const past=dt<hoje;
    const dispDia=dispMap[dt.getDay()];
    const naoAtende=!dispDia;
    const bloqDia=BLOQS.some(b=>b.tipo==='dia'&&b.data===`${ano}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    const isSel=selDia&&selDia.toDateString()===dt.toDateString();
    const isHj=dt.toDateString()===hoje.toDateString();
    const cls=isSel?'sel':past||naoAtende||bloqDia?'bloq':'disp hoje'.split(' ').filter((_,i)=>i===1?isHj:true).join(' ');
    calH+=`<button class="cd ${cls}" ${past||naoAtende||bloqDia?'disabled':`onclick="selecionarDia(${ano},${m},${d})"`}>${d}</button>`;
  }

  // Horários
  let hrsH='<div class="empty">Selecione um dia para ver os horários</div>';
  if(selDia&&selServ){
    hrsH=horariosLivres.length?`<div class="hrs-grid">${horariosLivres.map(h=>`<button class="hr-btn ${selHr===h?'sel':''}" onclick="selecionarHr('${h}')">${h}</button>`).join('')}</div>`:'<div class="empty">Nenhum horário disponível neste dia</div>';
  } else if(selDia&&!selServ){
    hrsH='<div class="empty">Selecione um serviço primeiro</div>';
  }

  c.innerHTML=`
    <p class="sec">Escolha o serviço</p>
    <div class="servs">${servsH}</div>
    <p class="sec">Escolha a data</p>
    <div class="cal-wrap">
      <div class="cal-nav"><button class="cal-btn" onclick="mudaMes(-1)">‹</button><h3>${MESES[m]} ${ano}</h3><button class="cal-btn" onclick="mudaMes(1)">›</button></div>
      <div class="cal-g" id="cal-g">${calH}</div>
    </div>
    <p class="sec">Horários disponíveis</p>
    ${hrsH}
    ${selServ&&selDia&&selHr?`
    <p class="sec">Seus dados</p>
    <div class="step-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${selServ.titulo} · ${fmtDia(selDia)} às ${selHr}</div>
    <div class="field"><label>Seu nome *</label><input type="text" id="inp-nome" placeholder="Maria Silva" oninput="atualizarBtn()"></div>
    <div class="field"><label>WhatsApp *</label><input type="tel" id="inp-tel" placeholder="(11) 99999-9999" oninput="atualizarBtn()"></div>`:''}`;
  atualizarBtn();
}

function selecionarServ(id){
  selServ=SERVS.find(s=>s.id===id)||null;
  selHr=null;
  if(selDia) calcularHorarios();
  else renderContent();
  atualizarBtn();
}

function mudaMes(d){calMes=new Date(calMes.getFullYear(),calMes.getMonth()+d,1);selDia=null;selHr=null;horariosLivres=[];renderContent();}

async function selecionarDia(a,m,d){
  selDia=new Date(a,m,d); selHr=null;
  if(selServ) await calcularHorarios();
  else renderContent();
}

async function calcularHorarios(){
  if(!selDia||!selServ) return;
  const dispDia=DISP.find(d=>d.dia_semana===selDia.getDay());
  if(!dispDia){horariosLivres=[];renderContent();return;}
  const ini=toMin(dispDia.hora_ini.substring(0,5));
  const fim=toMin(dispDia.hora_fim.substring(0,5));
  const dur=selServ.duracao_min||60;
  const intervalo=CFG?.intervalo_min||0;
  const antMin=CFG?.antecedencia_min||0;
  const agora=new Date();
  const isoDate=`${selDia.getFullYear()}-${String(selDia.getMonth()+1).padStart(2,'0')}-${String(selDia.getDate()).padStart(2,'0')}`;

  // Busca agendamentos do dia
  const{data:ags}=await sb.from('agendamentos').select('data_hora_ini,data_hora_fim,status').eq('cliente_id',PROF.id).gte('data_hora_ini',isoDate+'T00:00:00').lte('data_hora_ini',isoDate+'T23:59:59');
  const agsDia=(ags||[]).filter(a=>a.status!=='cancelado');

  // Bloqueios do dia
  const bloqHrs=BLOQS.filter(b=>{
    if(b.tipo==='dia'&&b.data===isoDate) return true;
    if(b.tipo==='horario'&&b.data===isoDate) return true;
    if(b.tipo==='recorrente'&&b.dia_semana===selDia.getDay()) return true;
    return false;
  });

  const livres=[];
  for(let t=ini;t+dur<=fim;t+=15){
    const htIni=new Date(selDia); htIni.setHours(Math.floor(t/60),t%60,0,0);
    const htFim=new Date(selDia); htFim.setHours(Math.floor((t+dur)/60),(t+dur)%60,0,0);

    // Antecedência
    if(htIni<=new Date(agora.getTime()+antMin*60000)) continue;

    // Conflito com agendamentos
    const conflito=agsDia.some(a=>{
      const ai=new Date(a.data_hora_ini).getTime();
      const af=new Date(a.data_hora_fim).getTime()+(intervalo*60000);
      return htIni.getTime()<af&&htFim.getTime()>ai;
    });
    if(conflito) continue;

    // Conflito com bloqueios
    const bloq=bloqHrs.some(b=>{
      if(b.tipo==='dia') return true;
      const bi=toMin(b.hora_ini?.substring(0,5)||'00:00');
      const bf=toMin(b.hora_fim?.substring(0,5)||'00:00');
      return t<bf&&(t+dur)>bi;
    });
    if(bloq) continue;

    livres.push(toHH(t));
  }
  horariosLivres=livres;
  renderContent();
}

function selecionarHr(hr){selHr=hr;renderContent();}

function atualizarBtn(){
  const btn=document.getElementById('btn-ag'); if(!btn)return;
  if(!selServ){btn.textContent='Selecione um serviço';btn.disabled=true;return;}
  if(!selDia){btn.textContent='Selecione uma data';btn.disabled=true;return;}
  if(!selHr){btn.textContent='Selecione um horário';btn.disabled=true;return;}
  const nome=document.getElementById('inp-nome')?.value.trim();
  const tel=document.getElementById('inp-tel')?.value.trim();
  if(!nome||!tel){btn.textContent='Preencha seus dados';btn.disabled=true;return;}
  btn.textContent=`Confirmar agendamento`;btn.disabled=false;
}

async function avancar(){
  const nome=document.getElementById('inp-nome')?.value.trim();
  const tel=document.getElementById('inp-tel')?.value.trim().replace(/\D/g,'');
  if(!selServ||!selDia||!selHr||!nome||!tel) return;
  const btn=document.getElementById('btn-ag');
  btn.textContent='Agendando...'; btn.disabled=true;
  const[hh,mm]=selHr.split(':').map(Number);
  const ini=new Date(selDia); ini.setHours(hh,mm,0,0);
  const fim=new Date(ini.getTime()+(selServ.duracao_min||60)*60000);
  const{error}=await sb.from('agendamentos').insert({cliente_id:PROF.id,servico_id:selServ.id,data_hora_ini:ini.toISOString(),data_hora_fim:fim.toISOString(),nome_cliente:nome,telefone:tel,status:'pendente'});
  if(error){btn.textContent='Confirmar agendamento';btn.disabled=false;alert('Erro ao agendar. Tente novamente.');return;}
  mostrarConfirmacao(nome,tel,ini);
}

function mostrarConfirmacao(nome,tel,ini){
  const dtF=fmtDia(ini);const hrF=ini.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.querySelector('.content').innerHTML=`
    <div class="conf">
      <div class="conf-icon">🌸</div>
      <h2>Solicitação enviada!</h2>
      <p>${nome}, seu agendamento foi recebido e ficará <strong>pendente</strong> até a confirmação.</p>
      <div class="conf-det">
        <div class="row"><span>💅</span><strong>${selServ.titulo}</strong></div>
        <div class="row"><span>📅</span><strong>${dtF}</strong></div>
        <div class="row"><span>🕐</span><strong>${hrF}</strong></div>
        <div class="row"><span>⏱</span><strong>${durStr(selServ.duracao_min||60)}</strong></div>
        ${selServ.valor?`<div class="row"><span>💰</span><strong>R$ ${Number(selServ.valor).toFixed(2).replace('.',',')}</strong></div>`:''}
      </div>
      <p>Você receberá uma confirmação pelo WhatsApp assim que a profissional aprovar. 💬</p>
    </div>`;
  document.querySelector('.btn-agendar').style.display='none';
}

init();
</script>
</body>
</html>

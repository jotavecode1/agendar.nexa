<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Horário</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cormorant+SC:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary: #b89a7a;
  --bg:      #ffffff;
  --text:    #5a3e2b;
  --muted:   #999;
  --border:  #e8e0d8;
  --soft:    #faf7f4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Inter',sans-serif; font-size:14px; color:var(--text); min-height:100vh; }

.page { max-width:420px; margin:0 auto; padding:32px 20px 60px; }

/* HEADER */
.header { text-align:center; margin-bottom:32px; }
.header .nome {
  font-family:'Cormorant Garamond',serif;
  font-size:26px; font-style:italic; color:var(--primary);
  margin-bottom:4px;
}
.header .sub { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }

/* STEPS */
.steps { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:32px; }
.step { display:flex; flex-direction:column; align-items:center; gap:4px; }
.step-dot {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:500; color:var(--muted);
  background:var(--bg); transition:all 0.2s;
}
.step.active .step-dot  { border-color:var(--primary); color:var(--primary); background:color-mix(in srgb,var(--primary) 10%,white); }
.step.done .step-dot    { border-color:var(--primary); background:var(--primary); color:#fff; }
.step-label { font-size:10px; color:var(--muted); letter-spacing:0.5px; }
.step.active .step-label { color:var(--primary); }
.step-line { width:32px; height:1px; background:var(--border); margin-bottom:14px; }

/* CARDS SERVIÇO */
.servicos-grid { display:flex; flex-direction:column; gap:10px; }
.servico-card {
  border:1.5px solid var(--border); border-radius:12px;
  padding:16px; cursor:pointer; transition:all 0.18s;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.servico-card:hover { border-color:var(--primary); background:var(--soft); }
.servico-card.selected { border-color:var(--primary); background:color-mix(in srgb,var(--primary) 8%,white); }
.servico-info h3 { font-size:14px; font-weight:500; margin-bottom:3px; }
.servico-info p  { font-size:12px; color:var(--muted); }
.servico-valor { font-size:15px; font-weight:600; color:var(--primary); white-space:nowrap; }
.servico-dur   { font-size:11px; color:var(--muted); text-align:right; }

/* CALENDÁRIO */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-header h3 { font-size:15px; font-weight:500; }
.cal-nav { background:none; border:none; color:var(--muted); cursor:pointer; padding:6px; font-size:18px; border-radius:6px; }
.cal-nav:hover { background:var(--soft); color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-name { text-align:center; font-size:10px; color:var(--muted); padding:4px 0; letter-spacing:0.5px; }
.cal-day {
  aspect-ratio:1; border-radius:8px; border:none;
  font-size:13px; cursor:pointer; background:none;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; color:var(--text);
}
.cal-day:disabled { color:#ddd; cursor:default; }
.cal-day.has-slots { background:var(--soft); font-weight:500; }
.cal-day.has-slots:hover { background:color-mix(in srgb,var(--primary) 15%,white); color:var(--primary); }
.cal-day.selected { background:var(--primary); color:#fff; font-weight:600; }
.cal-day.today { border:1.5px solid var(--primary); }
.cal-day.other-month { color:#ccc; }

/* HORÁRIOS */
.slots-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:20px; }
.slot-btn {
  padding:10px; border-radius:8px; border:1.5px solid var(--border);
  font-size:13px; font-weight:500; cursor:pointer; background:var(--bg);
  transition:all 0.15s; color:var(--text); font-family:'Inter',sans-serif;
}
.slot-btn:hover   { border-color:var(--primary); color:var(--primary); }
.slot-btn.selected{ background:var(--primary); border-color:var(--primary); color:#fff; }
.slot-btn:disabled{ background:#f5f5f5; color:#ccc; border-color:#eee; cursor:default; }
.no-slots { text-align:center; padding:32px; color:var(--muted); font-size:13px; }

/* FORMULÁRIO */
.form { display:flex; flex-direction:column; gap:14px; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:12px; color:var(--muted); font-weight:500; }
.field input {
  border:1.5px solid var(--border); border-radius:10px;
  padding:12px 14px; font-size:14px; font-family:'Inter',sans-serif;
  outline:none; transition:border-color 0.15s; color:var(--text); background:var(--bg);
}
.field input:focus { border-color:var(--primary); }

/* RESUMO */
.resumo {
  background:var(--soft); border:1.5px solid var(--border);
  border-radius:12px; padding:16px; margin-bottom:20px;
}
.resumo-row { display:flex; justify-content:space-between; padding:6px 0; font-size:13px; }
.resumo-row:not(:last-child) { border-bottom:1px solid var(--border); }
.resumo-row span:first-child { color:var(--muted); }
.resumo-row span:last-child  { font-weight:500; }

/* BOTÕES */
.btn {
  width:100%; padding:14px; border-radius:50px;
  font-family:'Cormorant SC',serif; font-size:14px; letter-spacing:2px;
  border:none; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary { background:var(--primary); color:#fff; margin-top:8px; }
.btn-primary:hover { filter:brightness(0.9); transform:translateY(-1px); }
.btn-primary:disabled { background:#ccc; cursor:default; transform:none; }
.btn-ghost { background:none; border:1.5px solid var(--border); color:var(--muted); margin-top:4px; }
.btn-ghost:hover { border-color:var(--primary); color:var(--primary); }

/* SUCESSO */
.sucesso {
  text-align:center; padding:40px 20px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}
.sucesso-icon {
  width:64px; height:64px; border-radius:50%;
  background:color-mix(in srgb,var(--primary) 15%,white);
  display:flex; align-items:center; justify-content:center;
}
.sucesso-icon svg { width:28px; height:28px; color:var(--primary); }
.sucesso h2 { font-family:'Cormorant Garamond',serif; font-size:24px; font-style:italic; color:var(--primary); }
.sucesso p  { font-size:13px; color:var(--muted); line-height:1.6; max-width:280px; }

/* SECTION TITLE */
.sec-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:14px; }
.sec-sub   { font-size:12px; color:var(--muted); margin-bottom:16px; }

/* LOADING */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
.spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* TEMA ESCURO */
body.escuro {
  --bg:#0f0f0f; --text:#e0e0e0; --border:#2a2a2a; --soft:#1a1a1a; --muted:#666;
}
body.escuro .field input { background:#111; color:#e0e0e0; }
</style>
</head>
<body>
<div class="page" id="page">
  <div class="loading"><div class="spinner"></div>carregando</div>
</div>

<script>
const SUPABASE_URL  = 'https://wnyfaefcfgwhawcswjyx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Pega slug da URL: /agendar/karol-ferreira
const slug = location.pathname.split('/').filter(Boolean).pop();

let PROF = null, SERVICOS = [], SLOTS_DISP = [];
let state = { step:1, servico:null, data:null, slot:null, calMes: new Date() };

const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

async function init() {
  const { data: prof } = await sb.from('clientes').select('*').eq('slug', slug).eq('ativo', true).single();
  if (!prof) { document.getElementById('page').innerHTML = '<div class="loading">Página não encontrada</div>'; return; }
  PROF = prof;

  // Aplica tema/cores
  document.documentElement.style.setProperty('--primary', prof.cor_primaria || '#b89a7a');
  document.documentElement.style.setProperty('--text',    prof.cor_texto    || '#5a3e2b');
  document.documentElement.style.setProperty('--bg',      prof.cor_fundo    || '#ffffff');
  if (prof.tema === 'escuro') document.body.classList.add('escuro');
  document.title = `Agendar · ${prof.nome}`;

  const { data: servs } = await sb.from('servicos').select('*').eq('cliente_id', prof.id).eq('ativo', true).order('ordem');
  SERVICOS = servs || [];

  // Carrega slots disponíveis (não bloqueados e sem agendamento confirmado)
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const { data: slots } = await sb.from('slots')
    .select('*')
    .eq('cliente_id', prof.id)
    .eq('bloqueado', false)
    .gte('data_hora', hoje.toISOString())
    .order('data_hora');
  
  // Filtra slots já agendados
  const { data: agends } = await sb.from('agendamentos')
    .select('slot_id')
    .eq('cliente_id', prof.id)
    .in('status', ['pendente','confirmado']);
  
  const ocupados = new Set((agends||[]).map(a => a.slot_id));
  SLOTS_DISP = (slots||[]).filter(s => !ocupados.has(s.id));

  renderStep();
}

function renderStep() {
  const page = document.getElementById('page');
  const header = `
    <div class="header">
      <div class="nome">${PROF.nome}</div>
      <div class="sub">${PROF.especialidade || 'agendamento online'}</div>
    </div>
    ${renderSteps()}
  `;

  if (state.step === 1) page.innerHTML = header + renderServicos();
  if (state.step === 2) page.innerHTML = header + renderCalendario();
  if (state.step === 3) page.innerHTML = header + renderForm();
  if (state.step === 4) page.innerHTML = renderSucesso();
}

function renderSteps() {
  const steps = [
    { n:1, label:'Serviço' },
    { n:2, label:'Horário' },
    { n:3, label:'Dados'   },
  ];
  return `<div class="steps">
    ${steps.map((s,i) => `
      ${i > 0 ? '<div class="step-line"></div>' : ''}
      <div class="step ${state.step > s.n ? 'done' : state.step === s.n ? 'active' : ''}">
        <div class="step-dot">${state.step > s.n ? '✓' : s.n}</div>
        <div class="step-label">${s.label}</div>
      </div>
    `).join('')}
  </div>`;
}

function renderServicos() {
  if (!SERVICOS.length) return '<div class="loading">Nenhum serviço cadastrado ainda.</div>';
  return `
    <div class="sec-title">Escolha o serviço</div>
    <div class="servicos-grid">
      ${SERVICOS.map(s => `
        <div class="servico-card ${state.servico?.id === s.id ? 'selected':''}" onclick="selecionarServico('${s.id}')">
          <div class="servico-info">
            <h3>${s.titulo}</h3>
            ${s.descricao ? `<p>${s.descricao}</p>` : ''}
            <p style="margin-top:4px">${s.duracao_min} min</p>
          </div>
          <div>
            <div class="servico-valor">${s.valor ? 'R$ '+Number(s.valor).toFixed(2).replace('.',',') : ''}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary" style="margin-top:20px" onclick="irParaHorario()" ${!state.servico?'disabled':''}>
      Continuar
    </button>
  `;
}

function selecionarServico(id) {
  state.servico = SERVICOS.find(s => s.id === id);
  renderStep();
}

function irParaHorario() {
  if (!state.servico) return;
  state.step = 2;
  renderStep();
}

function renderCalendario() {
  const mes = state.calMes;
  const ano = mes.getFullYear();
  const m   = mes.getMonth();

  // Dias que têm slots
  const diasComSlot = new Set(SLOTS_DISP.map(s => {
    const d = new Date(s.data_hora);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }));

  const primeiroDia = new Date(ano, m, 1).getDay();
  const ultimoDia   = new Date(ano, m+1, 0).getDate();
  const hoje        = new Date();

  let diasHTML = DIAS.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  // Dias vazios antes do primeiro
  for (let i = 0; i < primeiroDia; i++) diasHTML += '<button class="cal-day" disabled></button>';

  for (let d = 1; d <= ultimoDia; d++) {
    const data = new Date(ano, m, d);
    const key  = `${ano}-${m}-${d}`;
    const isHoje     = data.toDateString() === hoje.toDateString();
    const isPast     = data < hoje && !isHoje;
    const temSlot    = diasComSlot.has(key);
    const isSel      = state.data && state.data.toDateString() === data.toDateString();

    diasHTML += `<button class="cal-day ${temSlot?'has-slots':''} ${isSel?'selected':''} ${isHoje?'today':''}"
      ${isPast || !temSlot ? 'disabled' : `onclick="selecionarData(${ano},${m},${d})"`}>
      ${d}
    </button>`;
  }

  // Slots do dia selecionado
  let slotsHTML = '';
  if (state.data) {
    const slotsDia = SLOTS_DISP.filter(s => {
      const d = new Date(s.data_hora);
      return d.getFullYear() === state.data.getFullYear() &&
             d.getMonth()    === state.data.getMonth()    &&
             d.getDate()     === state.data.getDate();
    });

    if (!slotsDia.length) {
      slotsHTML = '<div class="no-slots">Nenhum horário disponível neste dia.</div>';
    } else {
      slotsHTML = `
        <div class="sec-title" style="margin-top:24px">Horários disponíveis</div>
        <div class="slots-grid">
          ${slotsDia.map(s => {
            const d = new Date(s.data_hora);
            const h = d.getHours().toString().padStart(2,'0');
            const min = d.getMinutes().toString().padStart(2,'0');
            const sel = state.slot?.id === s.id;
            return `<button class="slot-btn ${sel?'selected':''}" onclick="selecionarSlot('${s.id}')">${h}:${min}</button>`;
          }).join('')}
        </div>
      `;
    }
  }

  return `
    <div class="cal-header">
      <button class="cal-nav" onclick="mudarMes(-1)">‹</button>
      <h3>${MESES[m]} ${ano}</h3>
      <button class="cal-nav" onclick="mudarMes(1)">›</button>
    </div>
    <div class="cal-grid">${diasHTML}</div>
    ${slotsHTML}
    <button class="btn btn-primary" style="margin-top:20px" onclick="irParaForm()" ${!state.slot?'disabled':''}>
      Continuar
    </button>
    <button class="btn btn-ghost" onclick="voltar()">Voltar</button>
  `;
}

function selecionarData(ano, m, d) {
  state.data = new Date(ano, m, d);
  state.slot = null;
  renderStep();
}

function selecionarSlot(id) {
  state.slot = SLOTS_DISP.find(s => s.id === id);
  renderStep();
}

function mudarMes(dir) {
  state.calMes = new Date(state.calMes.getFullYear(), state.calMes.getMonth() + dir, 1);
  renderStep();
}

function irParaForm() {
  if (!state.slot) return;
  state.step = 3;
  renderStep();
}

function renderForm() {
  const d  = new Date(state.slot.data_hora);
  const dt = d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
  const hr = d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

  return `
    <div class="resumo">
      <div class="resumo-row"><span>Serviço</span><span>${state.servico.titulo}</span></div>
      <div class="resumo-row"><span>Data</span><span>${dt}</span></div>
      <div class="resumo-row"><span>Horário</span><span>${hr}</span></div>
      ${state.servico.valor ? `<div class="resumo-row"><span>Valor</span><span>R$ ${Number(state.servico.valor).toFixed(2).replace('.',',')}</span></div>` : ''}
    </div>
    <div class="sec-title">Seus dados</div>
    <div class="form">
      <div class="field">
        <label>Nome completo *</label>
        <input type="text" id="f-nome" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="field">
        <label>WhatsApp *</label>
        <input type="tel" id="f-tel" placeholder="(11) 99999-9999" autocomplete="tel">
      </div>
    </div>
    <button class="btn btn-primary" onclick="confirmarAgendamento()">Confirmar agendamento</button>
    <button class="btn btn-ghost" onclick="voltar()">Voltar</button>
  `;
}

async function confirmarAgendamento() {
  const nome = document.getElementById('f-nome').value.trim();
  const tel  = document.getElementById('f-tel').value.trim();
  if (!nome || !tel) { alert('Preencha nome e telefone'); return; }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Aguarde...';

  const { error } = await sb.from('agendamentos').insert({
    cliente_id:   PROF.id,
    servico_id:   state.servico.id,
    slot_id:      state.slot.id,
    data_hora:    state.slot.data_hora,
    nome_cliente: nome,
    telefone:     tel,
    status:       'pendente',
  });

  if (error) { alert('Erro ao agendar. Tente novamente.'); btn.disabled=false; btn.textContent='Confirmar agendamento'; return; }

  state.step = 4;
  renderStep();
}

function renderSucesso() {
  const d  = new Date(state.slot.data_hora);
  const dt = d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
  const hr = d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

  return `
    <div class="sucesso">
      <div class="sucesso-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Agendado!</h2>
      <p>Seu agendamento foi recebido e está <strong>aguardando confirmação</strong> da profissional. Você receberá uma mensagem no WhatsApp em breve.</p>
      <div class="resumo" style="width:100%;text-align:left">
        <div class="resumo-row"><span>Serviço</span><span>${state.servico.titulo}</span></div>
        <div class="resumo-row"><span>Data</span><span>${dt}</span></div>
        <div class="resumo-row"><span>Horário</span><span>${hr}</span></div>
      </div>
      <button class="btn btn-ghost" style="width:100%" onclick="location.href='/${slug}'">Voltar ao início</button>
    </div>
  `;
}

function voltar() {
  state.step--;
  if (state.step === 1) { state.servico = null; }
  if (state.step === 2) { state.slot = null; }
  renderStep();
}

init();
</script>
</body>
</html>

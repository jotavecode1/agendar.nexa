<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agendar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --primary:#c9a84c;--btn-txt:#0d0d0d;
  --bg:#0d0d0d;--text:#f0f0f0;--muted:rgba(255,255,255,0.45);
  --bor:rgba(255,255,255,0.08);--sur:rgba(255,255,255,0.04);--sur2:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}

/* HERO */
.hero{position:relative;height:46vh;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.hero-ph{width:100%;height:100%;background:linear-gradient(160deg,#2a2a2a,#1a1a1a);}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,0) 30%,rgba(0,0,0,.65) 70%,var(--bg) 100%);}
.hero-info{position:absolute;bottom:18px;left:18px;right:18px;}
.hero-nome{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;line-height:1.1;margin-bottom:5px;}
.hero-nome em{font-style:italic;color:var(--primary);}
.hero-esp{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);}

.content{padding:20px 16px 180px;}
.sec{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}

/* SERVIÇOS */
.servs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.sv{background:var(--sur);border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.sv.sel{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary);}
.sv img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.sv-ph{width:100%;aspect-ratio:4/3;background:var(--sur2);display:flex;align-items:center;justify-content:center;}
.sv-ph svg{opacity:.3;}
.sv-body{padding:12px;}
.sv-titulo{font-size:13px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.sv-dur{font-size:11px;color:var(--muted);margin-bottom:6px;}
.sv-preco{font-size:14px;font-weight:700;color:var(--primary);}

/* BTN VER HORARIOS */
.btn-ver{width:100%;padding:14px;border-radius:14px;background:var(--primary);color:var(--btn-txt);border:none;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:filter .15s;margin-bottom:28px;display:none;}
.btn-ver.show{display:block;}
.btn-ver:hover{filter:brightness(1.08);}

/* CALENDÁRIO */
.cal-section{display:none;}
.cal-section.show{display:block;}
.cal-nav{display:flex;align-items:center;margin-bottom:14px;}
.cal-nav h3{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:18px;}
.cal-nb{width:34px;height:34px;border-radius:50%;background:var(--sur);border:1px solid var(--bor);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.cal-nb:hover{border-color:var(--primary);color:var(--primary);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px;}
.cal-dn{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;}
.cd{aspect-ratio:1;border-radius:8px;border:none;font-size:12px;cursor:pointer;background:none;color:var(--text);display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Inter',sans-serif;}
.cd:disabled{color:rgba(255,255,255,.12);cursor:default;}
.cd.hoje{border:1px solid rgba(201,168,76,.4);}
.cd.bloq{color:rgba(255,255,255,.18);cursor:default;}
.cd.disp:hover{background:rgba(201,168,76,.15);}
.cd.sel{background:var(--primary);color:var(--btn-txt);font-weight:700;}

/* HORÁRIOS */
.hrs-section{display:none;margin-bottom:28px;}
.hrs-section.show{display:block;}
.hrs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.hr-btn{padding:11px;border-radius:10px;border:1px solid var(--bor);background:none;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;}
.hr-btn:hover{border-color:var(--primary);}
.hr-btn.sel{background:var(--primary);color:var(--btn-txt);border-color:var(--primary);font-weight:600;}

/* RESUMO SELECIONADO */
.resumo{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:12px 14px;margin-bottom:20px;display:none;font-size:12px;line-height:1.8;}
.resumo.show{display:block;}
.resumo strong{color:var(--primary);}

/* FORM */
.form-section{display:none;}
.form-section.show{display:block;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:11px;color:var(--muted);}
.field input{background:var(--sur2);border:1px solid var(--bor);color:var(--text);padding:11px 14px;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--primary);}

/* BARRA BOTTOM */
.bottom-bar{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:14px 16px;background:rgba(13,13,13,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bor);}
.bottom-bar button{width:100%;padding:15px;border-radius:14px;background:var(--primary);color:var(--btn-txt);border:none;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:filter .15s;}
.bottom-bar button:disabled{opacity:.35;cursor:default;}
.bottom-bar button:not(:disabled):hover{filter:brightness(1.08);}

/* CONFIRMAÇÃO */
.conf{text-align:center;padding:36px 16px;}
.conf-icon{font-size:52px;margin-bottom:16px;}
.conf h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;}
.conf p{font-size:13px;color:var(--muted);line-height:1.6;}
.conf-det{background:var(--sur);border-radius:14px;padding:16px;margin:20px 0;text-align:left;}
.conf-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bor);font-size:13px;}
.conf-row:last-child{border-bottom:none;}
.conf-row span:first-child{min-width:20px;}

.spin{width:28px;height:28px;border:2px solid var(--bor);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto;}
@keyframes sp{to{transform:rotate(360deg)}}
.empty-hrs{text-align:center;padding:20px;color:var(--muted);font-size:13px;}

/* PAGES & BOTTOM NAV */
.page{display:none;}
.page.active{display:block;}
.nav-bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(13,13,13,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bor);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.ni{flex:1;padding:12px 0;background:none;border:none;color:var(--muted);font-size:11px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:color .2s;}
.ni svg{width:18px;height:18px;}
.ni.active{color:var(--primary);}
.ni::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--primary);border-radius:2px 2px 0 0;transform:scaleX(0);transition:transform .2s;}
.ni.active::after{transform:scaleX(1);}
.page-content{padding:20px 16px 100px;}
.sobre-wrap{padding:32px 0 8px;text-align:center;}

/* SOBRE & SHARE */
.mini-sobre{padding:0;text-align:center;}
.mini-sobre-av{width:80px;height:80px;border-radius:50%;border:2px solid var(--primary);overflow:hidden;margin:0 auto 14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;}
.mini-sobre-av img{width:100%;height:100%;object-fit:cover;}
.mini-sobre-av span{font-family:'Playfair Display',serif;font-size:30px;font-style:italic;color:var(--primary);}
.mini-sobre-nome{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:4px;}
.mini-sobre-nome em{font-style:italic;color:var(--primary);}
.mini-sobre-esp{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.mini-sobre-bio{font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;text-align:left;margin-bottom:18px;}
/* CONTATO (compacto, abaixo da bio em Sobre) */
.mini-contato{display:flex;gap:8px;margin-top:4px;}
.mini-contato-btn{flex:1;padding:10px 6px;border-radius:10px;border:1px solid var(--bor);background:rgba(255,255,255,.04);color:var(--text);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;white-space:nowrap;}
.mini-contato-btn svg{width:13px;height:13px;flex-shrink:0;}


</style>
</head>
<body>

<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="spin"></div>
</div>

<script>
const SB_URL='https://wnyfaefcfgwhawcswjyx.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
const sb=supabase.createClient(SB_URL,SB_ANON);
const slug=location.pathname.split('/').filter(Boolean).pop();
const params=new URLSearchParams(location.search);

const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const hoje=new Date(); hoje.setHours(0,0,0,0);

let PROF=null, SERVS=[], DISP=[], BLOQS=[], CFG=null;
let selServ=null;
let calMes=new Date(hoje.getFullYear(),hoje.getMonth(),1);
let selDia=null, selHr=null;
let horariosLivres=[];
let etapa=1; // 1=serviço, 2=calendario, 3=dados

function toMin(s){const[h,m]=(s||'00:00').substring(0,5).split(':').map(Number);return h*60+m;}
function toHH(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
function durStr(m){return m>=60?`${Math.floor(m/60)}h${m%60?m%60+'min':''}`:`${m}min`;}
function fmtDia(d){const s=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});return s.charAt(0).toUpperCase()+s.slice(1);}
function fmtVal(v){return v?'R$ '+Number(v).toFixed(2).replace('.',','):'';}

function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p)?.classList.add('active');
  document.getElementById('nav-'+p)?.classList.add('active');
}

async function init(){
  const{data:prof,error}=await sb.from('clientes').select('*').eq('slug',slug).eq('agenda_ativo',true).single();
  if(!prof){
    document.getElementById('root').innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,.3)"><p style="font-size:32px;margin-bottom:12px">😕</p><p>Página não encontrada</p></div>';
    return;
  }
  PROF=prof;

  // Aplica cores
  // Usa visual específico da agenda (agf_*), com fallback para o visual do mini site
  document.documentElement.style.setProperty('--primary', prof.agf_primary||prof.cor_primary||'#c9a84c');
  document.documentElement.style.setProperty('--btn-txt', prof.agf_botao_txt||prof.cor_botao_txt||'#0d0d0d');
  document.documentElement.style.setProperty('--bg',      prof.agf_bg||prof.cor_bg||'#0d0d0d');
  document.documentElement.style.setProperty('--text',    prof.agf_texto||prof.cor_texto||'#f0f0f0');
  document.title=`Agendar · ${prof.nome}`;

  const[{data:servs},{data:disp},{data:bloqs},{data:cfg}]=await Promise.all([
    sb.from('servicos').select('*').eq('cliente_id',prof.id).eq('ativo',true).order('ordem'),
    sb.from('disponibilidade').select('*').eq('cliente_id',prof.id).eq('ativo',true),
    sb.from('bloqueios').select('*').eq('cliente_id',prof.id),
    sb.from('config_agenda').select('*').eq('cliente_id',prof.id).maybeSingle()
  ]);
  SERVS=servs||[]; DISP=disp||[]; BLOQS=bloqs||[]; CFG=cfg;

  const ini=prof.nome.charAt(0), resto=prof.nome.slice(1);

  document.getElementById('root').outerHTML=`
    <div class="page active" id="page-inicio">
      <div class="hero">
        ${prof.foto_capa_url?`<img src="${prof.foto_capa_url}" alt="">`:'<div class="hero-ph"></div>'}
        <div class="hero-grad"></div>
        <div class="hero-info">
          <div class="hero-nome"><em>${ini}</em>${resto}</div>
          ${prof.especialidade?`<div class="hero-esp">${prof.especialidade}</div>`:''}
        </div>
      </div>
      <div class="content">

        <!-- STEP 1: SERVIÇOS -->
        <p class="sec">1. Escolha o serviço</p>
        <div class="servs" id="servs-grid"></div>

        <!-- BTN VER HORÁRIOS -->
        <button class="btn-ver" id="btn-ver" onclick="verHorarios()">Ver horários disponíveis →</button>

        <!-- STEP 2: DATA -->
        <div class="cal-section" id="cal-section">
          <p class="sec">2. Escolha a data</p>
          <div class="cal-nav">
            <button class="cal-nb" onclick="mudaMes(-1)">‹</button>
            <h3 id="cal-mes"></h3>
            <button class="cal-nb" onclick="mudaMes(1)">›</button>
          </div>
          <div class="cal-g" id="cal-g"></div>
        </div>

        <!-- HORÁRIOS -->
        <div class="hrs-section" id="hrs-section">
          <p class="sec">3. Escolha o horário</p>
          <div id="hrs-wrap"></div>
        </div>

        <!-- RESUMO -->
        <div class="resumo" id="resumo"></div>

        <!-- STEP 3: DADOS -->
        <div class="form-section" id="form-section">
          <p class="sec">4. Seus dados</p>
          <div class="field">
            <label>Seu nome *</label>
            <input type="text" id="inp-nome" placeholder="Maria Silva" oninput="atualizarBtn()">
          </div>
          <div class="field">
            <label>WhatsApp *</label>
            <input type="tel" id="inp-tel" placeholder="(11) 99999-9999" oninput="atualizarBtn()">
          </div>
        </div>

      </div>
      <div class="bottom-bar">
        <button id="btn-ag" onclick="agendar()" disabled>Selecione um serviço</button>
      </div>
    </div>

    <div class="page" id="page-sobre">
      <div class="page-content">
        <div class="mini-sobre">
          <div class="mini-sobre-av" id="ms-av"></div>
          <div class="mini-sobre-nome" id="ms-nome"></div>
          <div class="mini-sobre-esp" id="ms-esp"></div>
          <div class="mini-sobre-bio" id="ms-bio"></div>
        </div>
        <div class="mini-contato" id="ms-contato"></div>
      </div>
    </div>

    <nav class="nav-bottom">
      <button class="ni active" onclick="showPage('inicio')" id="nav-inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Início
      </button>
      <button class="ni" onclick="showPage('sobre')" id="nav-sobre">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Sobre
      </button>
    </nav>`;

  renderServicos();
  renderCal();

  // Popula aba Sobre (bio + contato compacto)
  const profUrl=`${location.origin}/cliente/${prof.slug}`;
  const msAv=document.getElementById('ms-av');
  if(msAv){
    if(prof.foto_url) msAv.innerHTML=`<img src="${prof.foto_url}" alt="">`;
    else msAv.innerHTML=`<span>${ini}</span>`;
    document.getElementById('ms-nome').innerHTML=`<em>${ini}</em>${resto}`;
    document.getElementById('ms-esp').textContent=prof.especialidade||'';
    document.getElementById('ms-bio').textContent=prof.bio||'Nenhuma bio cadastrada.';

    const ICO_WA='<svg viewBox="0 0 24 24" fill="currentColor" style="color:#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.855L.057 23.428a.5.5 0 00.615.615l5.573-1.471A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>';
    const ICO_IG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>';
    const ICO_SHARE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>';

    const botoes=[];
    if(prof.whatsapp){
      const num=prof.whatsapp.replace(/\D/g,'');
      botoes.push(`<a class="mini-contato-btn" href="https://wa.me/${num}" target="_blank">${ICO_WA}WhatsApp</a>`);
    }
    if(prof.instagram){
      const user=prof.instagram.replace('@','').trim();
      botoes.push(`<a class="mini-contato-btn" href="https://instagram.com/${user}" target="_blank">${ICO_IG}Instagram</a>`);
    }
    botoes.push(`<button class="mini-contato-btn" onclick="navigator.share?navigator.share({url:'${profUrl}'}):navigator.clipboard?.writeText('${profUrl}')">${ICO_SHARE}Compartilhar</button>`);
    document.getElementById('ms-contato').innerHTML=botoes.join('');
  }

  // Preselect via ?s=
  const preId=params.get('s');
  if(preId){
    const sv=SERVS.find(s=>s.id===preId);
    if(sv) selecionarServ(sv.id);
  }
}

/* ── SERVIÇOS ── */
function renderServicos(){
  const g=document.getElementById('servs-grid');
  if(!SERVS.length){g.innerHTML='<p style="color:var(--muted);font-size:13px;grid-column:1/-1;padding:12px 0">Nenhum serviço disponível</p>';return;}
  g.innerHTML=SERVS.map(s=>`
    <div class="sv ${selServ?.id===s.id?'sel':''}" id="sv-${s.id}" onclick="selecionarServ('${s.id}')">
      ${s.foto_url?`<img src="${s.foto_url}" alt="${s.titulo}">`:'<div class="sv-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="32" height="32"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>'}
      <div class="sv-body">
        <div class="sv-titulo">${s.titulo}</div>
        <div class="sv-dur">${durStr(s.duracao_min||60)}</div>
        <div class="sv-preco">${fmtVal(s.valor)}</div>
      </div>
    </div>`).join('');
}

function selecionarServ(id){
  selServ=SERVS.find(s=>s.id===id)||null;
  // Reset etapa 2 e 3
  selDia=null; selHr=null; horariosLivres=[];
  document.getElementById('cal-section').classList.remove('show');
  document.getElementById('hrs-section').classList.remove('show');
  document.getElementById('form-section').classList.remove('show');
  document.getElementById('resumo').classList.remove('show');
  renderServicos();
  // Mostra botão ver horários
  const btnVer=document.getElementById('btn-ver');
  if(selServ){btnVer.classList.add('show');btnVer.textContent=`Ver horários — ${selServ.titulo} →`;}
  else btnVer.classList.remove('show');
  atualizarBtn();
}

/* ── VER HORÁRIOS ── */
function verHorarios(){
  if(!selServ) return;
  document.getElementById('cal-section').classList.add('show');
  document.getElementById('btn-ver').style.display='none';
  renderCal();
  // Scroll suave até o calendário
  setTimeout(()=>document.getElementById('cal-section').scrollIntoView({behavior:'smooth',block:'start'}),80);
  atualizarBtn();
}

/* ── CALENDÁRIO ── */
function renderCal(){
  const el=document.getElementById('cal-mes'); if(!el) return;
  const ano=calMes.getFullYear(), m=calMes.getMonth();
  el.textContent=`${MESES[m]} ${ano}`;
  const prim=new Date(ano,m,1).getDay(), ult=new Date(ano,m+1,0).getDate();
  const dispMap={}; DISP.forEach(d=>dispMap[d.dia_semana]=d);
  let h=DIAS.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  for(let i=0;i<prim;i++) h+=`<button class="cd" disabled></button>`;
  for(let d=1;d<=ult;d++){
    const dt=new Date(ano,m,d);
    const past=dt<hoje;
    const dispDia=dispMap[dt.getDay()];
    const naoAtende=!dispDia;
    const isoDate=`${ano}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const bloqDia=BLOQS.some(b=>b.tipo==='dia'&&b.data===isoDate);
    const isSel=selDia&&selDia.toDateString()===dt.toDateString();
    const isHj=dt.toDateString()===hoje.toDateString();
    const disabled=past||naoAtende||bloqDia;
    h+=`<button class="cd ${isSel?'sel':disabled?'bloq':'disp'} ${isHj&&!disabled?'hoje':''}"
      ${disabled?'disabled':`onclick="selecionarDia(${ano},${m},${d})"`}>${d}</button>`;
  }
  document.getElementById('cal-g').innerHTML=h;
}

function mudaMes(d){
  calMes=new Date(calMes.getFullYear(),calMes.getMonth()+d,1);
  selDia=null; selHr=null;
  document.getElementById('hrs-section').classList.remove('show');
  document.getElementById('form-section').classList.remove('show');
  document.getElementById('resumo').classList.remove('show');
  renderCal(); atualizarBtn();
}

async function selecionarDia(a,m,d){
  selDia=new Date(a,m,d); selHr=null;
  document.getElementById('form-section').classList.remove('show');
  document.getElementById('resumo').classList.remove('show');
  renderCal();
  await calcHorarios();
}

/* ── HORÁRIOS ── */
async function calcHorarios(){
  const dispDia=DISP.find(d=>d.dia_semana===selDia.getDay());
  if(!dispDia){horariosLivres=[];renderHrs();return;}
  const ini=toMin(dispDia.hora_ini), fim=toMin(dispDia.hora_fim);
  const dur=selServ?.duracao_min||60;
  const intervalo=CFG?.intervalo_min||0;
  const antMin=CFG?.antecedencia_min||0;
  const isoDate=`${selDia.getFullYear()}-${String(selDia.getMonth()+1).padStart(2,'0')}-${String(selDia.getDate()).padStart(2,'0')}`;
  const{data:ags}=await sb.from('agendamentos').select('data_hora_ini,data_hora_fim,status')
    .eq('cliente_id',PROF.id)
    .gte('data_hora_ini',isoDate+'T00:00:00')
    .lte('data_hora_ini',isoDate+'T23:59:59');
  const agsDia=(ags||[]).filter(a=>a.status!=='cancelado');
  const bloqHrs=BLOQS.filter(b=>{
    const iso=isoDate;
    if(b.tipo==='dia'&&b.data===iso) return true;
    if(b.tipo==='horario'&&b.data===iso) return true;
    if(b.tipo==='recorrente'&&b.dia_semana===selDia.getDay()) return true;
    return false;
  });
  const agora=new Date();
  const livres=[];
  for(let t=ini;t+dur<=fim;t+=15){
    const htIni=new Date(selDia); htIni.setHours(Math.floor(t/60),t%60,0,0);
    const htFim=new Date(selDia); htFim.setHours(Math.floor((t+dur)/60),(t+dur)%60,0,0);
    if(htIni<=new Date(agora.getTime()+antMin*60000)) continue;
    const conflito=agsDia.some(a=>{
      const ai=new Date(a.data_hora_ini).getTime();
      const af=new Date(a.data_hora_fim).getTime()+intervalo*60000;
      return htIni.getTime()<af&&htFim.getTime()>ai;
    });
    if(conflito) continue;
    const bloq=bloqHrs.some(b=>{
      if(b.tipo==='dia') return true;
      const bi=toMin(b.hora_ini||'00:00'), bf=toMin(b.hora_fim||'00:00');
      return t<bf&&(t+dur)>bi;
    });
    if(bloq) continue;
    livres.push(toHH(t));
  }
  horariosLivres=livres;
  renderHrs();
}

function renderHrs(){
  const sec=document.getElementById('hrs-section');
  const wrap=document.getElementById('hrs-wrap');
  sec.classList.add('show');
  if(!horariosLivres.length){
    wrap.innerHTML='<div class="empty-hrs">Nenhum horário disponível neste dia 😕<br><span style="font-size:11px">Tente outra data</span></div>';
    return;
  }
  wrap.innerHTML=`<div class="hrs-grid">${horariosLivres.map(h=>`
    <button class="hr-btn ${selHr===h?'sel':''}" onclick="selecionarHr('${h}')">${h}</button>
  `).join('')}</div>`;
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function selecionarHr(hr){
  selHr=hr;
  renderHrs();
  // Mostra resumo e form
  const resumo=document.getElementById('resumo');
  resumo.innerHTML=`✅ <strong>${selServ.titulo}</strong> · ${fmtDia(selDia)} às ${hr} · ${durStr(selServ.duracao_min||60)}${selServ.valor?' · '+fmtVal(selServ.valor):''}`;
  resumo.classList.add('show');
  document.getElementById('form-section').classList.add('show');
  setTimeout(()=>document.getElementById('form-section').scrollIntoView({behavior:'smooth',block:'start'}),80);
  atualizarBtn();
}

/* ── BOTÃO PRINCIPAL ── */
function atualizarBtn(){
  const btn=document.getElementById('btn-ag'); if(!btn) return;
  if(!selServ){btn.textContent='Selecione um serviço';btn.disabled=true;return;}
  // Serviço selecionado mas calendário ainda não aberto
  const calAberto=document.getElementById('cal-section').classList.contains('show');
  if(!calAberto){btn.textContent='Ver horários disponíveis →';btn.disabled=false;btn.onclick=verHorarios;return;}
  if(!selDia){btn.textContent='Selecione uma data';btn.disabled=true;return;}
  if(!selHr){btn.textContent='Selecione um horário';btn.disabled=true;return;}
  const nome=document.getElementById('inp-nome')?.value.trim();
  const tel=document.getElementById('inp-tel')?.value.trim();
  if(!nome||!tel){btn.textContent='Preencha seus dados';btn.disabled=true;return;}
  btn.textContent='Confirmar agendamento 🌸';btn.disabled=false;btn.onclick=agendar;
}

/* ── AGENDAR ── */
async function agendar(){
  const nome=document.getElementById('inp-nome')?.value.trim();
  const tel=document.getElementById('inp-tel')?.value.trim().replace(/\D/g,'');
  if(!selServ||!selDia||!selHr||!nome||!tel) return;
  const btn=document.getElementById('btn-ag');
  btn.textContent='Agendando...'; btn.disabled=true;
  const[hh,mm]=selHr.split(':').map(Number);
  const ini=new Date(selDia); ini.setHours(hh,mm,0,0);
  const fim=new Date(ini.getTime()+(selServ.duracao_min||60)*60000);
  const{error}=await sb.from('agendamentos').insert({
    cliente_id:PROF.id, servico_id:selServ.id,
    data_hora_ini:ini.toISOString(), data_hora_fim:fim.toISOString(),
    nome_cliente:nome, telefone:tel, status:'pendente'
  });
  if(error){btn.textContent='Confirmar agendamento 🌸';btn.disabled=false;alert('Erro ao agendar. Tente novamente.');return;}
  mostrarConfirmacao(nome,ini);
}

function mostrarConfirmacao(nome,ini){
  const dtF=fmtDia(ini);
  const hrF=ini.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.querySelector('.content').innerHTML=`
    <div class="conf">
      <div class="conf-icon">🌸</div>
      <h2>Solicitação enviada!</h2>
      <p>${nome}, seu pedido foi recebido e ficará <strong style="color:var(--text)">pendente</strong> até a confirmação da profissional.</p>
      <div class="conf-det">
        <div class="conf-row"><span>💅</span><span><strong>${selServ.titulo}</strong></span></div>
        <div class="conf-row"><span>📅</span><span>${dtF}</span></div>
        <div class="conf-row"><span>🕐</span><span>${hrF} · ${durStr(selServ.duracao_min||60)}</span></div>
        ${selServ.valor?`<div class="conf-row"><span>💰</span><span>${fmtVal(selServ.valor)}</span></div>`:''}
      </div>
      <p>Você receberá uma confirmação pelo WhatsApp assim que aprovado. 💬</p>
    </div>`;
  document.querySelector('.bottom-bar').style.display='none';
}

init();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando...</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #b89a7a;
    --bg:      #ffffff;
    --text:    #5a3e2b;
    --muted:   #c0a898;
    --card:    #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    transition: background 0.3s;
  }

  .card {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 32px 48px;
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--muted);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOTO ── */
  .photo-wrap {
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 1.5px solid var(--primary);
    overflow: hidden;
    margin-bottom: 24px;
    background: color-mix(in srgb, var(--primary) 15%, white);
    flex-shrink: 0;
  }
  .photo-wrap img { width:100%; height:100%; object-fit:cover; object-position:top center; }
  .photo-placeholder {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    color: var(--primary);
    font-size: 38px; font-weight: 300;
  }

  /* ── NOME ── */
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 400; font-style: italic;
    color: var(--text);
    line-height: 1.15; text-align: center;
    margin-bottom: 6px;
  }
  .name .inicial {
    font-size: 42px; font-weight: 300;
  }
  .specialty {
    font-family: 'Cormorant SC', serif;
    font-size: 11px; font-weight: 300;
    color: var(--muted);
    letter-spacing: 3px; text-align: center;
    margin-bottom: 32px;
  }
  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    margin-bottom: 32px;
  }

  /* ── BOTÕES ── */
  .buttons { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .btn {
    width: 100%; padding: 15px 24px;
    border-radius: 50px;
    font-family: 'Cormorant SC', serif;
    font-size: 13px; letter-spacing: 2px;
    text-decoration: none; text-align: center;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    border: none;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { filter: brightness(0.9); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid color-mix(in srgb, var(--primary) 45%, transparent);
  }
  .btn-outline:hover { background: color-mix(in srgb, var(--primary) 8%, transparent); border-color: var(--primary); transform: translateY(-1px); }

  .btn svg { width:17px; height:17px; flex-shrink:0; }

  /* ── TEMA ESCURO ── */
  body.escuro { background: #0a0a0a; }
  body.escuro .card { background: #0f0f0f; }
  body.escuro .btn-outline { color: var(--primary); }
  body.escuro .btn-primary { color: #0f0f0f; }

  /* ── 404 ── */
  .not-found { text-align:center; color: #999; }
  .not-found h2 { font-size: 48px; font-weight: 300; color: #ccc; margin-bottom: 8px; }
  .not-found p { font-size: 14px; letter-spacing: 1px; }

  .footer {
    margin-top: auto; padding-top: 48px;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1px; text-align: center;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>carregando</span>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL  = 'https://wnyfaefcfgwhawcswjyx.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
// ──────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Pega o slug da URL: /cliente/karol-ferreira → "karol-ferreira"
const slug = location.pathname.split('/').filter(Boolean).pop();

const ICONS = {
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`,
  instagram:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`,
  whatsapp: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.855L.057 23.428a.5.5 0 00.615.615l5.573-1.471A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>`,
  maps:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>`,
  link:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`
};

async function init() {
  // Busca cliente pelo slug
  const { data: cliente, error } = await sb
    .from('clientes')
    .select('*')
    .eq('slug', slug)
    .eq('ativo', true)
    .single();

  if (error || !cliente) { render404(); return; }

  // Busca os links
  const { data: links } = await sb
    .from('links')
    .select('*')
    .eq('cliente_id', cliente.id)
    .eq('ativo', true)
    .order('ordem');

  renderSite(cliente, links || []);
}

function renderSite(c, links) {
  // Aplica tema e cores via CSS vars
  document.documentElement.style.setProperty('--primary', c.cor_primaria);
  document.documentElement.style.setProperty('--text',    c.cor_texto);
  document.documentElement.style.setProperty('--bg',      c.cor_fundo);
  document.documentElement.style.setProperty('--card',    c.cor_fundo);
  document.documentElement.style.setProperty('--muted',   c.cor_primaria + '99');

  if (c.tema === 'escuro') document.body.classList.add('escuro');

  document.title = `${c.nome} · ${c.especialidade || ''}`;

  // Primeira letra para o inicial estilizado
  const inicial = c.nome.charAt(0);
  const resto   = c.nome.slice(1);

  // Foto
  const fotoHTML = c.foto_url
    ? `<img src="${c.foto_url}" alt="${c.nome}">`
    : `<div class="photo-placeholder">${inicial}</div>`;

  // Botões
  const botoesHTML = links.map(l => {
    const cls  = l.destaque ? 'btn btn-primary' : 'btn btn-outline';
    const icon = ICONS[l.icone] || ICONS.link;
    return `<a href="${l.url}" class="${cls}" target="_blank" rel="noopener">${icon}${l.label}</a>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="photo-wrap">${fotoHTML}</div>
    <div class="name"><span class="inicial">${inicial}</span>${resto}</div>
    ${c.especialidade ? `<div class="specialty">${c.especialidade}</div>` : ''}
    <div class="divider"></div>
    <div class="buttons">${botoesHTML}</div>
    <div class="footer">${c.nome.toLowerCase()}</div>
  `;
}

function render404() {
  document.getElementById('app').innerHTML = `
    <div class="not-found">
      <h2>404</h2>
      <p>página não encontrada</p>
    </div>
  `;
}

init();
</script>
</body>
</html>

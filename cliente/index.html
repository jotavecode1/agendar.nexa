<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carregando...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#c9a84c;--btn-txt:#0d0d0d;--bg:#0d0d0d;--text:#f0f0f0;--muted:rgba(255,255,255,0.45);--bor:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}

/* ── HOME: LAYOUT ESTILO LINKTREE ── */
.home-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 48px;}
.avatar-ring{width:110px;height:110px;border-radius:50%;border:2px solid var(--primary);padding:3px;margin-bottom:20px;flex-shrink:0;}
.avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;}
.avatar-inner img{width:100%;height:100%;object-fit:cover;display:block;}
.avatar-letra{font-family:'Playfair Display',serif;font-size:38px;font-style:italic;color:var(--primary);}
.prof-nome{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;text-align:center;margin-bottom:6px;line-height:1.2;}
.prof-nome em{font-style:italic;color:var(--primary);}
.prof-esp{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:32px;}
.links-wrap{width:100%;display:flex;flex-direction:column;gap:10px;}
.link-btn{display:flex;align-items:center;gap:12px;padding:15px 22px;border-radius:50px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;text-decoration:none;transition:all .2s;width:100%;}
.link-btn.dest{background:var(--primary);color:var(--btn-txt);}
.link-btn.dest:hover{filter:brightness(1.08);}
.link-btn.norm{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--bor);}
.link-btn.norm:hover{background:rgba(255,255,255,.1);}
.link-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.link-icon svg{width:18px;height:18px;}

/* ── SOBRE ── */
.sobre-wrap{padding:32px 20px 40px;text-align:center;}
.sobre-av{width:90px;height:90px;border-radius:50%;border:2px solid var(--primary);overflow:hidden;margin:0 auto 18px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;}
.sobre-av img{width:100%;height:100%;object-fit:cover;}
.sobre-av span{font-family:'Playfair Display',serif;font-size:34px;font-style:italic;color:var(--primary);}
.sobre-nome{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:5px;}
.sobre-nome em{font-style:italic;color:var(--primary);}
.sobre-esp{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
.sobre-bio{font-size:14px;color:rgba(255,255,255,.7);line-height:1.75;text-align:left;}



.spin{width:28px;height:28px;border:2px solid var(--bor);border-top-color:var(--primary);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted)"><div class="spin"></div></div>

<script>
const SB_URL='https://wnyfaefcfgwhawcswjyx.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndueWZhZWZjZmd3aGF3Y3N3anl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTMwNjMsImV4cCI6MjA5NjY2OTA2M30.xkfao9VVMr8QM16FhrpxY6lPsjkhBsnfalmjYgXiPn8';
const SITE='https://agendar-nexa-v1.vercel.app';
const sb=supabase.createClient(SB_URL,SB_ANON);
const slug=location.pathname.split('/').filter(Boolean).pop();

const ICONS={
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  instagram:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',
  whatsapp:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.855L.057 23.428a.5.5 0 00.615.615l5.573-1.471A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>',
  maps:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.134 2 5 5.134 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.866-3.134-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>'
};

async function init(){
  const{data:prof}=await sb.from('clientes').select('*').eq('slug',slug).eq('minisite_ativo',true).single();
  if(!prof){
    document.getElementById('root').innerHTML='<p style="color:rgba(255,255,255,.3);font-size:13px">Página não encontrada</p>';
    return;
  }
  document.documentElement.style.setProperty('--primary', prof.cor_primary||'#c9a84c');
  document.documentElement.style.setProperty('--btn-txt', prof.cor_botao_txt||'#0d0d0d');
  document.documentElement.style.setProperty('--bg',      prof.cor_bg||'#0d0d0d');
  document.documentElement.style.setProperty('--text',    prof.cor_texto||'#f0f0f0');
  document.title=`${prof.nome}${prof.especialidade?' · '+prof.especialidade:''}`;

  const{data:links}=await sb.from('links').select('*').eq('cliente_id',prof.id).eq('ativo',true).order('ordem');

  const ini=prof.nome.charAt(0);
  const resto=prof.nome.slice(1);
  const agenUrl=`${SITE}/agendar/${prof.slug}`;
  const profUrl=`${SITE}/cliente/${prof.slug}`;

  const avatarHTML=prof.foto_url
    ?`<img src="${prof.foto_url}" alt="${prof.nome}">`
    :`<span class="avatar-letra">${ini}</span>`;

  const linksHTML=(links||[]).map(l=>`
    <a href="${l.url}" class="link-btn ${l.destaque?'dest':'norm'}" target="_blank">
      <span class="link-icon">${ICONS[l.icone]||ICONS.link}</span>
      ${l.label}
    </a>`).join('');

  document.getElementById('root').outerHTML=`
    <div class="page active" id="page-home">
      <div class="home-wrap">
        <div class="avatar-ring">
          <div class="avatar-inner">${avatarHTML}</div>
        </div>
        <div class="prof-nome"><em>${ini}</em>${resto}</div>
        ${prof.especialidade?`<div class="prof-esp">${prof.especialidade}</div>`:'<div style="margin-bottom:32px"></div>'}
        <div class="links-wrap">${linksHTML||'<p style="color:var(--muted);font-size:13px;text-align:center">Em breve</p>'}</div>
      </div>
    </div>

`;
}

init();
</script>
</body>
</html>
